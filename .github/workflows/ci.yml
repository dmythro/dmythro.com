name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Lint, Types & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: oven-sh/setup-bun@v2

      - uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            .turbo
          key: ci-${{ runner.os }}-${{ hashFiles('bun.lock') }}-${{ github.sha }}
          restore-keys: |
            ci-${{ runner.os }}-${{ hashFiles('bun.lock') }}-
            ci-${{ runner.os }}-

      - run: bun install --frozen-lockfile
      - run: bun run ci
      - run: bun run check-types
      - run: bun test
        working-directory: packages/locales

  build-www2:
    name: Build www2
    needs: ci
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: oven-sh/setup-bun@v2

      - uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            .turbo
          key: ci-${{ runner.os }}-${{ hashFiles('bun.lock') }}-${{ github.sha }}
          restore-keys: |
            ci-${{ runner.os }}-${{ hashFiles('bun.lock') }}-
            ci-${{ runner.os }}-

      - run: bun install --frozen-lockfile
      - run: bun run build --filter=www2

      - uses: actions/upload-artifact@v4
        with:
          name: www2-dist
          path: apps/www2/dist

  deploy-www2:
    name: Deploy www2
    needs: build-www2
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
      pull-requests: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: www2-dist
          path: apps/www2/dist

      - uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy apps/www2/dist --project-name=dmythro-com --branch=${{ github.head_ref || github.ref_name }}
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
